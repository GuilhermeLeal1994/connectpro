<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <div id="header"></div>

    <main>

        <!-- HERO -->
        <section class="hero" style="padding: 60px 20px;">
            <h2>Fale conosco</h2>
            <p>Tem alguma dúvida ou precisa de ajuda? Envie sua mensagem.</p>
        </section>

        <!-- FORMULÁRIO -->
        <section class="login-central">

            <form onsubmit="return validarForm()">

                <input type="text" id="nome" placeholder="Seu nome" required>

                <input type="email" id="email" placeholder="Seu e-mail" required>

                <textarea id="mensagem" placeholder="Descreva sua mensagem" rows="5" required></textarea>

                <button type="submit" class="btn">Enviar</button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script src="js/script.js"></script>

</body>

</html>
