<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - ConnectPro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <h2 id="titulo">Cadastro</h2>
    <p>Crie sua conta</p>

    <div class="tipos">
      <button type="button" onclick="selecionarTipo('cliente', event)">Cliente</button>
      <button type="button" onclick="selecionarTipo('profissional', event)">Profissional</button>
    </div>

    <form onsubmit="return enviarForm()">
      <input
        type="text"
        id="nome"
        placeholder="Seu nome"
        required
      />

      <input
        type="email"
        id="email"
        placeholder="Seu email"
        required
      />

      <input
        type="password"
        id="senha"
        placeholder="Sua senha"
        required
      />

      <button type="submit" class="btn">Cadastrar</button>
    </form>

    <span>
      Já tem conta?
      <a href="login.html">Entrar</a>
    </span>
  </div>

  <script src="js/script.js"></script>
  <script>
    modo = "cadastro";
  </script>
</body>
</html>
